<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="no-referrer">
  <title>ワンココ - アカウントの削除確認</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", sans-serif; background-color: #f5f5f5; margin: 0; padding: 0; }
    .container { max-width: 480px; margin: 60px auto; background-color: #ffffff; border-radius: 12px; padding: 40px 32px; }
    h1 { font-size: 22px; color: #1a1a1a; margin: 0 0 16px; }
    p { color: #555555; font-size: 15px; line-height: 1.7; margin: 0 0 16px; }
    .warning { background-color: #fff3f3; border: 1px solid #ffcccc; border-radius: 8px; padding: 16px; margin: 24px 0; }
    .warning p { color: #cc3333; margin: 0; font-size: 14px; }
    button { width: 100%; padding: 14px; background-color: #cc3333; color: #ffffff; font-size: 15px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; }
    button:hover { background-color: #aa2222; }
    button:disabled { background-color: #aaaaaa; cursor: not-allowed; }
    .message { margin-top: 20px; padding: 14px; border-radius: 8px; font-size: 14px; display: none; }
    .message.success { background-color: #f0fff0; border: 1px solid #99cc99; color: #336633; }
    .message.error { background-color: #fff0f0; border: 1px solid #cc9999; color: #663333; }
    #loading { text-align: center; color: #999999; font-size: 15px; }
  </style>
</head>
<body>
  <div class="container">
    <div id="loading"><p>確認中...</p></div>
    <div id="valid-area" style="display:none;">
      <h1>アカウントを削除しますか？</h1>
      <p>以下のボタンを押すと、アカウントが完全に削除されます。</p>
      <div class="warning">
        <p>⚠️ アカウントを削除すると、プロフィール・位置情報・ウォーク履歴などすべてのデータが完全に削除されます。この操作は取り消せません。</p>
      </div>
      <button id="delete-btn" onclick="handleDelete()">アカウントを削除する</button>
    </div>
    <div id="message" class="message"></div>
  </div>
  <script>
    const API_BASE = 'https://bcpeverqdutfpuzqenjr.supabase.co/functions/v1';
    const token = new URLSearchParams(location.search).get('token');

    window.addEventListener('DOMContentLoaded', function() {
      if (!token) {
        showError('無効なリンクです。');
        return;
      }
      document.getElementById('loading').style.display = 'none';
      document.getElementById('valid-area').style.display = 'block';
    });

    async function handleDelete() {
      const btn = document.getElementById('delete-btn');
      btn.disabled = true;
      btn.textContent = '削除中...';

      try {
        const res = await fetch(`${API_BASE}/confirm-account-deletion?token=${encodeURIComponent(token)}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          referrerPolicy: 'no-referrer',
        });
        const data = await res.json();

        document.getElementById('valid-area').style.display = 'none';
        const msg = document.getElementById('message');
        if (res.ok) {
          msg.className = 'message success';
          msg.textContent = 'アカウントが正常に削除されました。ワンココをご利用いただきありがとうございました。';
        } else {
          msg.className = 'message error';
          msg.textContent = data.error || '削除に失敗しました。しばらくしてからお試しください。';
        }
        msg.style.display = 'block';
      } catch (_e) {
        btn.disabled = false;
        btn.textContent = 'アカウントを削除する';
        const msg = document.getElementById('message');
        msg.className = 'message error';
        msg.textContent = '通信エラーが発生しました。しばらくしてからお試しください。';
        msg.style.display = 'block';
      }
    }

    function showError(text) {
      document.getElementById('loading').style.display = 'none';
      const msg = document.getElementById('message');
      msg.className = 'message error';
      msg.textContent = text;
      msg.style.display = 'block';
    }
  </script>
</body>
</html>
